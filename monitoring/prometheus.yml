# Prometheus configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'earthquake-detection'

scrape_configs:
  - job_name: 'earthquake-detector'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: '/metrics'

  - job_name: 'system'
    static_configs:
      - targets: ['localhost:9100']

  - job_name: 'mqtt'
    static_configs:
      - targets: ['localhost:9283']

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093
